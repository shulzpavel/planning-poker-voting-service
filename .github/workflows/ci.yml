name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  notify-start:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-start.yml@main
    with:
      service_label: voting-service
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONPATH=. python -m pytest -q -p no:cacheprovider
      - run: PYTHONPATH=. python -m compileall -q services app config.py session_store.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t planning-poker-voting-service .

  deploy:
    name: Deploy voting-service to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh voting-service

  notify-result:
    if: always() && !cancelled()
    needs: [test, docker, deploy]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-result.yml@main
    with:
      service_label: voting-service
      test_result: ${{ needs.test.result }}
      docker_result: ${{ needs.docker.result }}
      deploy_result: ${{ needs.deploy.result }}
      notify_on_success: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
