name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONPATH=. python -m pytest -q -p no:cacheprovider
      - run: PYTHONPATH=. python -m compileall -q services app config.py session_store.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t planning-poker-voting-service .

  deploy:
    name: Deploy voting-service to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh voting-service
