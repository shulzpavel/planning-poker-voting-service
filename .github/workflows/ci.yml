name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            deploy:
              - '**'
              - '!README.md'
              - '!docs/**'

  notify-start:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-start.yml@main
    with:
      service_label: voting-service
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: planning_poker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/planning_poker_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: PYTHONPATH=. python -m pytest -q -p no:cacheprovider
      - run: PYTHONPATH=. python -m compileall -q services app config.py session_store.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t planning-poker-voting-service .

  deploy:
    name: Deploy voting-service to production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.deploy == 'true'
    needs: [test, docker, changes]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd /opt/planning-poker-dev
            export DEPLOY_TRIGGER="github:${{ github.repository }}@${{ github.sha }}"
            ./infra/deploy/deploy-service-prod.sh voting-service

  notify-result:
    if: always() && !cancelled() && (needs.changes.outputs.deploy == 'true' || needs.test.result == 'failure' || needs.docker.result == 'failure')
    needs: [test, docker, deploy, changes]
    uses: shulzpavel/planning-poker-dev/.github/workflows/ci-notify-result.yml@main
    with:
      service_label: voting-service
      test_result: ${{ needs.test.result }}
      docker_result: ${{ needs.docker.result }}
      deploy_result: ${{ needs.deploy.result }}
      notify_on_success: true
    secrets:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
